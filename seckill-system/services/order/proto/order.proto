syntax = "proto3";

package order;

option go_package = "seckill-system/services/order/proto/gen";

service OrderService {
  rpc CreateOrder (CreateOrderRequest) returns (CreateOrderResponse);
  rpc PayOrder (PayOrderRequest) returns (PayOrderResponse);
  rpc GetOrderListByUserID (GetOrderListByUserIDRequest) returns (GetOrderListByUserIDResponse);
  rpc GetOrderDetail (GetOrderDetailRequest) returns (GetOrderDetailResponse);
  rpc GetAllOrders (GetAllOrdersRequest) returns (GetAllOrdersResponse);
  rpc ShipOrder (ShipOrderRequest) returns (ShipOrderResponse);
  rpc GetProductSalesStats (GetProductSalesStatsRequest) returns (GetProductSalesStatsResponse);
}

message OrderInfo {
  uint64 id = 1;
  string order_no = 2;
  uint64 user_id = 3;
  uint64 product_id = 4;
  uint64 seckill_product_id = 5;
  int32 quantity = 6;
  double total_price = 7;
  int32 status = 8;
  string created_at = 9;
  int32 logistics_status = 10;
  string tracking_no = 11;
  string paid_at = 12;
  string shipped_at = 13;
}

message CreateOrderRequest {
  uint64 user_id = 1;
  uint64 product_id = 2;
  int32 quantity = 3;
}

message CreateOrderResponse {
  int32 code = 1;
  string message = 2;
  OrderInfo data = 3;
}

message PayOrderRequest {
  uint64 user_id = 1;
  uint64 order_id = 2;
}

message PayOrderResponse {
  int32 code = 1;
  string message = 2;
  OrderInfo data = 3;
}

message GetOrderListByUserIDRequest {
  uint64 user_id = 1;
}

message GetOrderListByUserIDResponse {
  int32 code = 1;
  string message = 2;
  repeated OrderInfo data = 3;
}

message GetOrderDetailRequest {
  uint64 order_id = 1;
}

message GetOrderDetailResponse {
  int32 code = 1;
  string message = 2;
  OrderInfo data = 3;
}

message GetAllOrdersRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message GetAllOrdersResponse {
  int32 code = 1;
  string message = 2;
  repeated OrderInfo data = 3;
  int32 total = 4;
}

message ShipOrderRequest {
  uint64 order_id = 1;
  string tracking_no = 2;
}

message ShipOrderResponse {
  int32 code = 1;
  string message = 2;
  OrderInfo data = 3;
}

message ProductSalesStat {
  uint64 product_id = 1;
  string product_name = 2;
  int32 paid_quantity = 3;
  double paid_amount = 4;
}

message GetProductSalesStatsRequest {}

message GetProductSalesStatsResponse {
  int32 code = 1;
  string message = 2;
  repeated ProductSalesStat data = 3;
}
