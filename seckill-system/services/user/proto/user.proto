syntax = "proto3";

package user;

option go_package = "seckill-system/services/user/proto/gen";

service UserService {
  rpc GenerateCaptcha (GenerateCaptchaRequest) returns (GenerateCaptchaResponse);
  rpc Register (RegisterRequest) returns (RegisterResponse);
  rpc Login (LoginRequest) returns (LoginResponse);
  rpc ParseToken (ParseTokenRequest) returns (ParseTokenResponse);
  rpc GetUserByID (GetUserByIDRequest) returns (GetUserByIDResponse);
}

message UserInfo {
  uint64 id = 1;
  string username = 2;
  string created_at = 3;
  int32 role = 5;
}

message GenerateCaptchaRequest {}

message GenerateCaptchaResponse {
  int32 code = 1;
  string message = 2;
  string captcha_id = 3;
  string captcha_image = 4;
  int32 expires_in = 5;
}

message RegisterRequest {
  string username = 1;
  string password = 2;
}

message RegisterResponse {
  int32 code = 1;
  string message = 2;
  UserInfo data = 3;
}

message LoginRequest {
  string username = 1;
  string password = 2;
  string captcha_id = 3;
  string captcha_code = 4;
  string client_ip = 5;
}

message LoginResponse {
  int32 code = 1;
  string message = 2;
  string token = 3;
}

message ParseTokenRequest {
  string token = 1;
}

message ParseTokenResponse {
  int32 code = 1;
  string message = 2;
  uint64 user_id = 3;
  string username = 4;
  int32 role = 5;
}

message GetUserByIDRequest {
  uint64 id = 1;
}

message GetUserByIDResponse {
  int32 code = 1;
  string message = 2;
  UserInfo data = 3;
}
