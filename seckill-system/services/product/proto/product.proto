syntax = "proto3";

package product;

option go_package = "seckill-system/services/product/proto/gen";

service ProductService {
  rpc GetProducts (GetProductsRequest) returns (GetProductsResponse);
  rpc CheckStock (CheckStockRequest) returns (CheckStockResponse);
  rpc DeductStock (DeductStockRequest) returns (DeductStockResponse);
  rpc GetProductList (GetProductListRequest) returns (GetProductListResponse);
  rpc GetProductDetail (GetProductDetailRequest) returns (GetProductDetailResponse);
  rpc CreateProduct (CreateProductRequest) returns (CreateProductResponse);
  rpc ReleaseSeckillStock (ReleaseSeckillStockRequest) returns (ReleaseSeckillStockResponse);
}

message SeckillProductInfo {
  uint64 id = 1;
  uint64 product_id = 2;
  string product_name = 3;
  string product_description = 4;
  double product_price = 5;
  double seckill_price = 6;
  int32 stock = 7;
  string start_time = 8;
  string end_time = 9;
  int32 status = 10;
}

message ProductInfo {
  uint64 id = 1;
  string name = 2;
  string description = 3;
  double price = 4;
  int32 stock = 5;
  string created_at = 6;
}

message GetProductsRequest {}

message GetProductsResponse {
  int32 code = 1;
  string message = 2;
  repeated SeckillProductInfo data = 3;
}

message CheckStockRequest {
  uint64 seckill_product_id = 1;
}

message CheckStockResponse {
  int32 code = 1;
  string message = 2;
  int32 stock = 3;
}

message DeductStockRequest {
  uint64 seckill_product_id = 1;
  uint64 user_id = 2;
  string request_id = 3;
}

message DeductStockResponse {
  int32 code = 1;
  string message = 2;
  int32 result = 3; // 1=success, 0=out of stock, -1=already purchased, -2=error
  string reservation_id = 4;
  uint64 product_id = 5;
  double seckill_price = 6;
}

message GetProductListRequest {
  int32 limit = 1;
  int32 offset = 2;
  string keyword = 3;
  double min_price = 4;
  double max_price = 5;
}

message GetProductListResponse {
  int32 code = 1;
  string message = 2;
  repeated ProductInfo data = 3;
  int32 total = 4;
}

message GetProductDetailRequest {
  uint64 id = 1;
}

message GetProductDetailResponse {
  int32 code = 1;
  string message = 2;
  ProductInfo data = 3;
}

message CreateProductRequest {
  string product_name = 1;
  string product_description = 2;
  double product_price = 3;
  int32 stock = 4;
}

message CreateProductResponse {
  int32 code = 1;
  string msg = 2;
  int64 product_id = 3;
}

message ReleaseSeckillStockRequest {
  uint64 user_id = 1;
  uint64 seckill_product_id = 2;
  int32 quantity = 3;
}

message ReleaseSeckillStockResponse {
  int32 code = 1;
  string message = 2;
}
