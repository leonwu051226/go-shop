syntax = "proto3";

package product;

option go_package = "seckill-system/services/product/proto/gen";

// 商品服务
service ProductService {
  // 获取秒杀商品列表
  rpc GetProducts (GetProductsRequest) returns (GetProductsResponse);
  // 查询 Redis 库存
  rpc CheckStock (CheckStockRequest) returns (CheckStockResponse);
  // 执行 Redis Lua 脚本扣减库存
  rpc DeductStock (DeductStockRequest) returns (DeductStockResponse);
  // 获取常规商品列表（支持分页）
  rpc GetProductList (GetProductListRequest) returns (GetProductListResponse);
  // 获取常规商品详情
  rpc GetProductDetail (GetProductDetailRequest) returns (GetProductDetailResponse);
}

message SeckillProductInfo {
  uint64 id = 1;
  uint64 product_id = 2;
  string product_name = 3;
  string product_description = 4;
  double product_price = 5;
  double seckill_price = 6;
  int32 stock = 7;
  string start_time = 8;
  string end_time = 9;
  int32 status = 10;
}

message ProductInfo {
  uint64 id = 1;
  string name = 2;
  string description = 3;
  double price = 4;
  int32 stock = 5;
  string created_at = 6;
}

// ========== GetProducts ==========
message GetProductsRequest {}

message GetProductsResponse {
  int32 code = 1;
  string message = 2;
  repeated SeckillProductInfo data = 3;
}

// ========== CheckStock ==========
message CheckStockRequest {
  uint64 seckill_product_id = 1;
}

message CheckStockResponse {
  int32 code = 1;
  string message = 2;
  int32 stock = 3;
}

// ========== DeductStock ==========
message DeductStockRequest {
  uint64 seckill_product_id = 1;
}

message DeductStockResponse {
  int32 code = 1;
  string message = 2;
  int32 result = 3; // 1=success, 0=out of stock, -2=error
}

// ========== GetProductList ==========
message GetProductListRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message GetProductListResponse {
  int32 code = 1;
  string message = 2;
  repeated ProductInfo data = 3;
  int32 total = 4;
}

// ========== GetProductDetail ==========
message GetProductDetailRequest {
  uint64 id = 1;
}

message GetProductDetailResponse {
  int32 code = 1;
  string message = 2;
  ProductInfo data = 3;
}
