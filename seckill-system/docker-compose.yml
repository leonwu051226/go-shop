version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: seckill-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: seckill
      MYSQL_USER: seckill
      MYSQL_PASSWORD: seckill123456
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - seckill-network

  redis:
    image: redis:7.0
    container_name: seckill-redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - seckill-network
    command: redis-server --appendonly yes

  rabbitmq:
    image: rabbitmq:3-management
    container_name: seckill-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123456
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - seckill-network

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:

networks:
  seckill-network:
    driver: bridge
