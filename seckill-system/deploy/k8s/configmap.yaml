# K8s 环境下的统一配置
# 核心改动：将所有 localhost 替换为对应中间件/服务的 K8s Service DNS 名
apiVersion: v1
kind: ConfigMap
metadata:
  name: seckill-config
data:
  config.yaml: |
    server:
      port: "8080"
      mode: debug

    user_grpc:
      host: user-service
      port: 50051

    product_grpc:
      host: product-service
      port: 50052

    order_grpc:
      host: order-service
      port: 50053

    mysql:
      host: mysql-service
      port: 3306
      user: seckill
      password: seckill123456
      dbname: seckill
      max_open_conns: 100
      max_idle_conns: 20

    redis:
      host: redis-service
      port: 6379
      password: ""
      db: 0

    rabbitmq:
      host: rabbitmq-service
      port: 5672
      user: admin
      password: admin123456
      vhost: /
